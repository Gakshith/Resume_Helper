<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI - Professional Resume Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --success: #10b981;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Main Layout */
        .app-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-group {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 4px;
            backdrop-filter: blur(10px);
        }

        .toggle-btn {
            padding: 0.5rem 1.25rem;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-btn.active {
            background: white;
            color: #667eea;
            box-shadow: var(--shadow-sm);
        }

        .btn {
            padding: 0.625rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Toolbar */
        #toolbar-container {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: none;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .ql-toolbar.ql-snow {
            border: none !important;
        }

        /* Document Viewer */
        .document-viewer {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .document-viewer::-webkit-scrollbar {
            width: 8px;
        }

        .document-viewer::-webkit-scrollbar-track {
            background: transparent;
        }

        .document-viewer::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .pdf-container {
            width: 210mm;
            background: white;
            box-shadow: var(--shadow-xl);
            border-radius: 8px;
            overflow: hidden;
            display: block;
        }

        .pdf-container iframe {
            width: 100%;
            height: 297mm;
            border: none;
        }

        .editor-container {
            width: 210mm;
            background: white;
            box-shadow: var(--shadow-xl);
            border-radius: 8px;
            overflow: hidden;
            display: none;
        }

        .ql-container.ql-snow {
            border: none !important;
            font-size: 11pt;
            color: #1a1c1e;
        }

        .ql-editor {
            padding: 30mm 25mm !important;
            min-height: 297mm;
            line-height: 1.6;
        }

        .ql-editor h1 {
            text-align: center;
            font-size: 18pt !important;
            font-weight: 800 !important;
            color: #000 !important;
            margin-top: 0 !important;
            margin-bottom: 4pt !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ql-editor h2 {
            border-bottom: 1px solid #000;
            font-size: 11pt !important;
            font-weight: 700 !important;
            color: #000 !important;
            margin-top: 14pt !important;
            margin-bottom: 8pt !important;
            padding-bottom: 2pt !important;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .ql-editor p {
            margin-bottom: 4pt !important;
            font-size: 10.5pt !important;
        }

        .ql-editor li {
            margin-bottom: 2pt !important;
            font-size: 10.5pt !important;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .insight-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1.25rem;
            border-radius: 12px;
            color: white;
            margin-bottom: 1rem;
        }

        .insight-label {
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .insight-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .download-btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .download-btn:hover {
            background: white;
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* Chat */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .message {
            max-width: 85%;
            padding: 0.875rem 1.125rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-ai {
            background: var(--bg-main);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input-container {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            background: white;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-main);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            outline: none;
            color: var(--text-primary);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        /* Icons */
        .icon {
            width: 18px;
            height: 18px;
        }

        .icon-sm {
            width: 16px;
            height: 16px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                </div>
                <span>Resume<strong>AI</strong></span>
            </div>

            <div class="header-controls">
                <div class="toggle-group">
                    <button class="toggle-btn" id="btnEdit" onclick="switchView('edit')">
                        <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                            </path>
                        </svg>
                        Edit
                    </button>
                    <button class="toggle-btn active" id="btnSource" onclick="switchView('source')">
                        <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        Source
                    </button>
                </div>

                <button class="btn btn-primary" onclick="exportToPDF()">
                    <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Export PDF
                </button>

                <a href="/home" class="btn btn-ghost">
                    <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Exit
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Toolbar -->
            <div id="toolbar-container">
                <span class="ql-formats">
                    <select class="ql-header">
                        <option value="1">Name</option>
                        <option value="2">Section</option>
                        <option selected>Normal</option>
                    </select>
                </span>
                <span class="ql-formats">
                    <button class="ql-bold"></button>
                    <button class="ql-italic"></button>
                    <button class="ql-underline"></button>
                </span>
                <span class="ql-formats">
                    <button class="ql-list" value="ordered"></button>
                    <button class="ql-list" value="bullet"></button>
                </span>
                <span class="ql-formats">
                    <button class="ql-align" value=""></button>
                    <button class="ql-align" value="center"></button>
                </span>
            </div>

            <!-- Document Viewer -->
            <div class="document-viewer">
                <div class="pdf-container" id="pdfContainer">
                    <iframe src="{{ pdf_url }}" frameborder="0"></iframe>
                </div>
                <div class="editor-container" id="editorContainer">
                    <div id="editor"></div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="insight-card">
                    <div class="insight-label">Predicted Role</div>
                    <div class="insight-value">{{ prediction }}</div>
                </div>
                <button class="download-btn" onclick="window.open('{{ pdf_url }}', '_blank')">
                    <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Download Original
                </button>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message message-ai">
                        Hi! I'm your AI Resume Consultant. I can help you refine your resume for maximum impact. What
                        would you like to improve?
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <input type="text" class="chat-input" id="chatInput"
                            placeholder="Ask me anything about your resume..." onkeypress="handleEnter(event)">
                        <button class="send-btn" onclick="sendMessage()">
                            <svg class="icon-sm" fill="currentColor" viewBox="0 0 24 24"
                                style="transform: rotate(45deg);">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Data -->
    <div id="rawText" style="display:none;">{{ extracted_text }}</div>

    <!-- Scripts -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Initialize Quill
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: '#toolbar-container'
            }
        });

        const rawText = document.getElementById('rawText').innerText;
        let editorInitialized = false;

        function switchView(view) {
            const pdfContainer = document.getElementById('pdfContainer');
            const editorContainer = document.getElementById('editorContainer');
            const toolbar = document.getElementById('toolbar-container');
            const btnEdit = document.getElementById('btnEdit');
            const btnSource = document.getElementById('btnSource');

            if (view === 'edit') {
                if (!editorInitialized) {
                    quill.setContents([{ insert: rawText }]);
                    editorInitialized = true;
                }
                pdfContainer.style.display = 'none';
                editorContainer.style.display = 'block';
                toolbar.style.display = 'flex';
                btnEdit.classList.add('active');
                btnSource.classList.remove('active');
            } else {
                pdfContainer.style.display = 'block';
                editorContainer.style.display = 'none';
                toolbar.style.display = 'none';
                btnEdit.classList.remove('active');
                btnSource.classList.add('active');
            }
        }

        async function exportToPDF() {
            const element = document.querySelector('.ql-editor');
            const opt = {
                margin: 0,
                filename: 'resume.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Generating...';
            btn.disabled = true;

            try {
                await html2pdf().set(opt).from(element).save();
            } catch (err) {
                console.error('PDF Export Error:', err);
                alert('Export failed. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'message-user');
            input.value = '';

            const loadingId = addMessage('Thinking...', 'message-ai');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                const loadingEl = document.getElementById('msg-' + loadingId);
                if (loadingEl) loadingEl.remove();

                addMessage(data.reply, 'message-ai');
            } catch (error) {
                console.error('Error:', error);
                const loadingEl = document.getElementById('msg-' + loadingId);
                if (loadingEl) loadingEl.remove();
                addMessage("I'm sorry, I'm having trouble connecting right now.", 'message-ai');
            }
        }

        let msgCounter = 0;
        function addMessage(text, className) {
            msgCounter++;
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

            div.className = `message ${className}`;
            div.id = 'msg-' + msgCounter;
            div.innerHTML = formattedText;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            return msgCounter;
        }

        // Initialize to source view
        switchView('source');
    </script>
</body>

</html>
