{% extends "base.html" %}
{% block title %}Create Account · ResumeAI{% endblock %}
{% block body %}
<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="brand-icon"><i class="ti ti-file-text" style="font-size:28px"></i></div>
            <div class="brand-name">Resume<span>AI</span></div>
        </div>
        <div class="auth-card">
            <div class="auth-head">
                <h1>Create your account</h1>
                <p>Start optimizing your career today</p>
            </div>

            {% if error %}
            <div class="error"><i class="ti ti-alert-circle" style="font-size:20px"></i>{{ error }}</div>
            {% endif %}

            <form action="/register" method="post">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="UserName" class="form-input" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="Password" class="form-input" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create account <i class="ti ti-arrow-right"></i></button>
            </form>

            <div class="auth-foot">Already have an account? <a href="/login">Sign in</a></div>
        </div>
    </div>
</div>
{% endblock %}
