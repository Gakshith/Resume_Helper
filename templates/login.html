{% extends "base.html" %}
{% block title %}Sign In · ResumeAI{% endblock %}
{% block body %}
<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="brand-icon"><i class="ti ti-file-text" style="font-size:28px"></i></div>
            <div class="brand-name">Resume<span>AI</span></div>
        </div>
        <div class="auth-card">
            <div class="auth-head">
                <h1>Welcome back</h1>
                <p>Sign in to analyze and elevate your resume</p>
            </div>

            {% if error %}
            <div class="error"><i class="ti ti-alert-circle" style="font-size:20px"></i>{{ error }}</div>
            {% endif %}

            <form action="/login" method="post">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="UserName" class="form-input" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="Password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign in <i class="ti ti-arrow-right"></i></button>
            </form>

            <div class="auth-foot">Don't have an account? <a href="/register">Create one now</a></div>
        </div>
    </div>
</div>
{% endblock %}
